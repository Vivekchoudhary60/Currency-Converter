<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency convertor</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <p class="title">Currency Converter</p>

    <div class="container">
        <form action="">
            <div class="amount">
                <p>Enter Amount</p>
                <input class="ammount" type="number" value="1">

            </div>

            <div class="select-container">
                <div class="both from">
                    <p>From</p>
                    <div class="select1 select">
                        <img class="flag1 flag" src="https://flagsapi.com/US/flat/64.png" alt="">
                        <select name="from" class="select1-select">
                        </select>
                    </div>
                </div>
                <img class="arrow" src="img.png" alt=""
                    srcset="">
                <div class="both to">
                    <p>To</p>
                    <div class="select2 select">
                        <img class="flag2 flag" src="https://flagsapi.com/IN/flat/64.png" alt="">
                        <select name="to" class="select2-select">
                        </select>
                    </div>
                </div>
            </div>

            <div>
                <p class="msg"> </p>
                <button class="btn"> Calculate

                </button>
            </div>
        </form>


    </div>

    <script src="codes.js"></script>
    <script src="script.js"></script>
</body>

</html>
